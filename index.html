          { day:4, date:"Sun, May 23", task:"Incorporate — Private LLM Setup",   detail:"Begin setting up your home lab and private LLM infrastructure. Install Ollama or LM Studio. Test Llama 3 or Mistral against your content creation tasks. Begin migrating your AI-powered workflows to run locally." },
          { day:5, date:"Tue, May 25", task:"Incorporate — Feed All Data to LLM",detail:"Feed all 12 months of data into your private LLM context: content performance data, extension analytics, funnel data, customer feedback, coaching insights. Your private LLM becomes the most informed AI about your business." },
          { day:6, date:"Sun, May 30", task:"Extension — Prepare for Sale",       detail:"Begin productising the YouTube metric extension for sale to other creators. Clean up the code, write documentation, and design a simple landing page. Your extension is now a product." },
          { day:7, date:"Tue, Jun 1", overflow: true, task:"Extension — Pricing & Launch Plan", detail:"Define the extension pricing model: one-time purchase, monthly subscription, or freemium. Build the launch plan — who is your buyer, where do you find them, what is the hook?" },
          { day:8, date:"Sun, Jun 6", overflow: true, task:"Extension — Soft Launch to Audience",detail:"Soft launch the extension to your existing YouTube audience. These are your warmest buyers — they have watched you build it. Gather feedback and early sales data before broader launch." },
          { day:9, task:"Year 1 Complete — Year 2 Plan ✓",   detail:"Year 1 is complete. Document the full state of your ecosystem: revenue, audience size, automation coverage, products live, coaching clients active, private LLM operational, and extension launched. Write your Year 2 vision. The machine is built — now you scale it." },

    const dayTypes = [

      { key: "purpose",   label: "Wed & Sat",  sublabel: "Purpose Day",    icon: "📖", description: "Codex / Newsletter",        color: "#0369A1" },
      { key: "youtube",   label: "Tue & Sun",  sublabel: "Creativion Day", icon: "🎬", description: "YouTube Channel",           color: "#BE185D" },
    ];

    const weekDays = [
      { d: "MON", c: "#7C3AED", i: "👔" },
      { d: "TUE", c: "#BE185D", i: "🎬" },
      { d: "WED", c: "#0369A1", i: "📖" },
      { d: "THU", c: "#7C3AED", i: "👔" },
      { d: "FRI", c: "#2a2a2a", i: "🧹" },
      { d: "SAT", c: "#0369A1", i: "📖" },
      { d: "SUN", c: "#BE185D", i: "🎬" },
    ];

    /* ── Export Modal ───────────────────────────────────────────────── */
    function ExportModal({ content, filename, onClose }) {
      const [copied, setCopied] = useState(false);
      const copy = () => {
        try {
          navigator.clipboard.writeText(content).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }).catch(fallback);
        } catch(e) { fallback(); }
        function fallback() {
          try {
            const ta = document.createElement("textarea");
            ta.value = content; ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
            document.body.appendChild(ta); ta.focus(); ta.select();
            document.execCommand("copy"); document.body.removeChild(ta);
            setCopied(true); setTimeout(() => setCopied(false), 2500);
          } catch(e2) {}
        }
      };
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"'Segoe UI',system-ui,sans-serif"}}
          onClick={onClose}>
          <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:14,width:"100%",maxWidth:660,maxHeight:"80vh",display:"flex",flexDirection:"column",overflow:"hidden"}}
            onClick={e => e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderBottom:"1px solid #222",flexShrink:0}}>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#ddd"}}>{filename}</div>
                <div style={{fontSize:10,color:"#555",marginTop:2}}>Copy all → paste into a text editor → save as <span style={{color:"#888",fontFamily:"monospace"}}>{filename}</span></div>
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                <button onClick={copy}
                  style={{background:copied?"#14532d":"#1a2a1a",color:copied?"#86efac":"#22c55e",border:"1px solid #22c55e44",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontSize:11,fontWeight:700,minWidth:100,transition:"all 0.2s"}}>
                  {copied ? "✓ Copied!" : "Copy All"}
                </button>
                <button onClick={onClose}
                  style={{background:"#1a1a1a",color:"#666",border:"1px solid #2a2a2a",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>✕</button>
              </div>
            </div>
            <textarea readOnly value={content}
              style={{flex:1,background:"#0d0d0d",color:"#888",border:"none",padding:"14px 18px",fontFamily:"'Courier New',monospace",fontSize:10,lineHeight:1.7,resize:"none",outline:"none",overflowY:"auto",minHeight:200}} />
          </div>
        </div>
      );
    }

    /* ── Dashboard ──────────────────────────────────────────────────── */
    function Dashboard({ log, checkedCount, xCount, onClose }) {
      const [exportModal, setExportModal] = useState(null);

      const grouped = {};
      [...log].reverse().forEach(entry => {
        const d = (entry.checkedAt || "").split("T")[0];
        if (d) { if (!grouped[d]) grouped[d] = []; grouped[d].push(entry); }
      });
      const days = Object.keys(grouped).sort((a,b) => b.localeCompare(a));

      const fmt = iso => { try { return new Date(iso).toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}); } catch(e) { return iso||""; } };
      const fmtT = iso => { try { return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"}); } catch(e) { return ""; } };
      const colName = c => c==="brandDays"?"Working Day":c==="purpose"?"Purpose Day":"Creativion Day";

      const exportCSV = () => {
        const rows = [["Task","Scheduled Date","Column","Phase","Status","Logged Date","Logged Time"]];
        [...log].reverse().forEach(e => rows.push([
          `"${(e.task||"").replace(/"/g,'""')}"`, `"${e.date||""}"`,
          `"${colName(e.column)}"`, `"${e.phase||""}"`,
          `"${e.status==="complete"?"Complete":"Incomplete"}"`,
          `"${fmt(e.checkedAt)}"`, `"${fmtT(e.checkedAt)}"`,
        ]));
        setExportModal({ content: rows.map(r=>r.join(",")).join("\n"), filename:`elevare-${new Date().toISOString().split("T")[0]}.csv` });
      };

      const exportJSON = () => {
        const data = {
          exported: new Date().toISOString(), totalLogged: log.length,
          completed: checkedCount, incomplete: xCount, daysActive: days.length,
          tasks: [...log].reverse().map(e => ({ task:e.task, scheduledDate:e.date, column:colName(e.column), phase:e.phase, status:e.status==="complete"?"Complete":"Incomplete", loggedAt:e.checkedAt, loggedDate:fmt(e.checkedAt), loggedTime:fmtT(e.checkedAt) }))
        };
        setExportModal({ content: JSON.stringify(data, null, 2), filename:`elevare-${new Date().toISOString().split("T")[0]}.json` });
      };

      return (
        <div style={{position:"fixed",inset:0,background:"#0A0A0A",zIndex:1000,overflowY:"auto",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#F5F5F5"}}>
          {exportModal && <ExportModal content={exportModal.content} filename={exportModal.filename} onClose={()=>setExportModal(null)} />}
          <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 60px"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <div>
                <div style={{fontSize:9,letterSpacing:3,color:"#555",textTransform:"uppercase",marginBottom:4}}>Elevaré — Completion Log</div>
                <h2 style={{fontSize:22,fontWeight:800,margin:0,background:"linear-gradient(90deg,#fff 40%,#777)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Dashboard</h2>
              </div>
              <button onClick={onClose} style={{background:"#1a1a1a",color:"#aaa",border:"1px solid #333",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700}}>← Back to Schedule</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
              {[{l:"Completed",v:checkedCount,c:"#22c55e"},{l:"Incomplete",v:xCount,c:"#ef4444"},{l:"Days Active",v:days.length,c:"#0369A1"},{l:"Last Entry",v:log.length>0?fmt(log[log.length-1].checkedAt).split(",")[0]:"—",c:"#7C3AED"}].map(s=>(
                <div key={s.l} style={{background:"#141414",border:`1px solid ${s.c}33`,borderRadius:12,padding:"14px 8px",textAlign:"center"}}>
                  <div style={{fontSize:s.l==="Last Entry"?12:22,fontWeight:800,color:s.c,lineHeight:1.2}}>{s.v}</div>
                  <div style={{fontSize:8,color:"#555",marginTop:5,letterSpacing:1,textTransform:"uppercase"}}>{s.l}</div>
                </div>
              ))}
            </div>

            <div style={{background:"#111",border:"1px solid #222",borderRadius:12,padding:"14px 16px",marginBottom:24,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#ccc",marginBottom:3}}>Export Your Data</div>
                <div style={{fontSize:10,color:"#444"}}>{log.length} entr{log.length!==1?"ies":"y"} · {checkedCount} complete · {xCount} incomplete · {days.length} active day{days.length!==1?"s":""}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={exportCSV} disabled={log.length===0}
                  style={{background:log.length===0?"#0f0f0f":"#1a2a1a",color:log.length===0?"#2a2a2a":"#22c55e",border:`1px solid ${log.length===0?"#1a1a1a":"#22c55e33"}`,borderRadius:8,padding:"9px 18px",cursor:log.length===0?"default":"pointer",fontSize:11,fontWeight:700,letterSpacing:0.3}}>
                  Export CSV
                </button>
                <button onClick={exportJSON} disabled={log.length===0}
                  style={{background:log.length===0?"#0f0f0f":"#1a1a2a",color:log.length===0?"#2a2a2a":"#818cf8",border:`1px solid ${log.length===0?"#1a1a1a":"#818cf833"}`,borderRadius:8,padding:"9px 18px",cursor:log.length===0?"default":"pointer",fontSize:11,fontWeight:700,letterSpacing:0.3}}>
                  Export JSON
                </button>
              </div>
            </div>

            {log.length === 0 && (
              <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a2a",fontSize:13,fontStyle:"italic"}}>No tasks logged yet — use ✓ or ✕ on any task.</div>
            )}
            {days.map(day => (
              <div key={day} style={{marginBottom:20}}>
                <div style={{fontSize:9,color:"#444",letterSpacing:2,fontWeight:800,textTransform:"uppercase",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1a1a"}}>{fmt(day+"T12:00:00")}</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {grouped[day].map((entry,i) => {
                    const ok = entry.status === "complete";
                    const cc = entry.column==="brandDays"?"#7C3AED":entry.column==="purpose"?"#0369A1":"#BE185D";
                    return (
                      <div key={i} style={{background:"#141414",border:`1px solid ${ok?"#22c55e1a":"#ef44441a"}`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                            <span style={{fontSize:8,fontWeight:700,color:cc,background:cc+"15",border:`1px solid ${cc}33`,borderRadius:4,padding:"2px 7px",letterSpacing:0.5,whiteSpace:"nowrap"}}>{colName(entry.column)}</span>
                            <span style={{fontSize:9,color:"#444"}}>{entry.phase}</span>
                          </div>
                          <div style={{fontSize:12,fontWeight:700,color:"#ddd"}}>{entry.task}</div>
                          {entry.date && <div style={{fontSize:10,color:"#3a3a3a",marginTop:2}}>{entry.date}</div>}
                        </div>
                        <div style={{textAlign:"right",flexShrink:0,paddingLeft:8}}>
                          <div style={{fontSize:16,fontWeight:800,color:ok?"#22c55e":"#ef4444"}}>{ok?"✓":"✕"}</div>
                          <div style={{fontSize:8,color:ok?"#22c55e55":"#ef444455",fontWeight:700,letterSpacing:0.8,marginTop:1}}>{ok?"DONE":"MISSED"}</div>
                          <div style={{fontSize:9,color:"#444",marginTop:3}}>{fmtT(entry.checkedAt)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Main Schedule ──────────────────────────────────────────────── */
    function Schedule() {
      const [activePhase, setActivePhase] = useState(0);
      const [expandedDay, setExpandedDay] = useState(null);
      const [showDashboard, setShowDashboard] = useState(false);
      const [checkedTasks, setCheckedTasks] = useState(() => new Set(ls.get("elv_ck", [])));
      const [xTasks, setXTasks] = useState(() => new Set(ls.get("elv_x", [])));
      const [taskLog, setTaskLog] = useState(() => ls.get("elv_log", []));

      useEffect(() => { ls.set("elv_ck", [...checkedTasks]); }, [checkedTasks]);
      useEffect(() => { ls.set("elv_x", [...xTasks]); }, [xTasks]);
      useEffect(() => { ls.set("elv_log", taskLog); }, [taskLog]);

      const phase = phases[activePhase];
      const toggleDay = (id) => setExpandedDay(prev => prev === id ? null : id);

      const markTask = (e, eid, bd, dtKey, phaseName, status) => {
        e.stopPropagation();
        const isCheck = status === "complete";
        const currentSet = isCheck ? checkedTasks : xTasks;
        const otherSet = isCheck ? xTasks : checkedTasks;
        const setThis = isCheck ? setCheckedTasks : setXTasks;
        const setOther = isCheck ? setXTasks : setCheckedTasks;

        if (currentSet.has(eid)) {
          // Toggle off
          setThis(prev => { const n = new Set(prev); n.delete(eid); return n; });
          setTaskLog(log => log.filter(l => l.id !== eid));
        } else {
          // Toggle on, clear other
          setThis(prev => { const n = new Set(prev); n.add(eid); return n; });
          setOther(prev => { const n = new Set(prev); n.delete(eid); return n; });
          setTaskLog(log => [...log.filter(l => l.id !== eid), {
            id: eid, task: bd.task, date: bd.date||"",
            column: dtKey, phase: phaseName, status,
            checkedAt: new Date().toISOString(),
          }]);
        }
      };

      if (showDashboard) {
        return <Dashboard log={taskLog} checkedCount={checkedTasks.size} xCount={xTasks.size} onClose={() => setShowDashboard(false)} />;
      }

      return (
        <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#0A0A0A", minHeight: "100vh", color: "#F5F5F5" }}>

          {/* HEADER */}
          <div style={{ background: "linear-gradient(135deg, #0d0d1a 0%, #111827 50%, #0f1f3d 100%)", padding: "28px 16px 20px", borderBottom: "1px solid #1e1e2e" }}>
            <div style={{ maxWidth: 960, margin: "0 auto" }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#555", marginBottom: 6, textTransform: "uppercase" }}>12-Month Master Schedule — Elevaré</div>
              <h1 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 2px", background: "linear-gradient(90deg, #fff 40%, #777)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                April 1, 2026 → June 2027
              </h1>
              <p style={{ color: "#555", margin: "6px 0 0", fontSize: 11 }}>Mon/Thu · Tue/Sun · Wed/Sat · Friday (chores only)</p>
              <button onClick={() => setShowDashboard(true)}
                style={{ marginTop: 12, background: "#1a1a1a", color: "#888", border: "1px solid #2a2a2a", borderRadius: 8, padding: "7px 16px", cursor: "pointer", fontSize: 11, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 8 }}>
                <span>📊</span> Dashboard
                {checkedTasks.size > 0 && <span style={{ background: "#22c55e1a", color: "#22c55e", borderRadius: 10, padding: "1px 8px", fontSize: 10 }}>{checkedTasks.size} done</span>}
                {xTasks.size > 0 && <span style={{ background: "#ef44441a", color: "#ef4444", borderRadius: 10, padding: "1px 8px", fontSize: 10 }}>{xTasks.size} missed</span>}
              </button>
              <div style={{ display: "flex", gap: 7, marginTop: 14, flexWrap: "wrap" }}>
                {dayTypes.map(d => (
                  <div key={d.key} style={{ background: d.color + "15", border: `1px solid ${d.color}40`, borderRadius: 9, padding: "6px 11px", display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 15 }}>{d.icon}</span>
                    <div>
                      <div style={{ fontSize: 9, color: d.color, fontWeight: 700, letterSpacing: 0.8 }}>{d.label}</div>
                      <div style={{ fontSize: 10, color: "#aaa" }}>{d.sublabel} — {d.description}</div>
                    </div>
                  </div>
                ))}
                <div style={{ background: "#11111188", border: "1px solid #2a2a2a", borderRadius: 9, padding: "6px 11px", display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 15 }}>🧹</span>
                  <div>
                    <div style={{ fontSize: 9, color: "#555", fontWeight: 700 }}>Friday</div>
                    <div style={{ fontSize: 10, color: "#444" }}>Chores Only</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* PHASE TABS */}
          <div style={{ background: "#0f0f0f", borderBottom: "1px solid #1a1a1a", overflowX: "auto" }}>
            <div style={{ display: "flex", maxWidth: 960, margin: "0 auto", padding: "0 6px" }}>
              {phases.map((p, i) => (
                <button key={p.id} onClick={() => { setActivePhase(i); setExpandedDay(null); }}
                  style={{ padding: "10px 10px", background: "none", border: "none", borderBottom: activePhase === i ? `3px solid ${p.color}` : "3px solid transparent", color: activePhase === i ? "#fff" : "#3a3a3a", cursor: "pointer", fontSize: 8, fontWeight: 800, letterSpacing: 0.3, whiteSpace: "nowrap", transition: "all 0.15s" }}>
                  <div style={{ color: activePhase === i ? p.color : "#2a2a2a", fontSize: 7, marginBottom: 3 }}>{p.dates}</div>
                  {p.label}
                </button>
              ))}
            </div>
          </div>

          {/* PHASE BODY */}
          <div style={{ maxWidth: 960, margin: "0 auto", padding: "20px 14px 40px" }}>

            {/* Phase header */}
            <div style={{ background: `linear-gradient(135deg, ${phase.color}20, ${phase.color}06)`, border: `1px solid ${phase.color}40`, borderRadius: 14, padding: "16px 20px", marginBottom: 18, display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontSize: 8, color: phase.color, letterSpacing: 2, fontWeight: 800, textTransform: "uppercase", marginBottom: 2 }}>{phase.season}</div>
                <div style={{ fontSize: 9, color: phase.color, letterSpacing: 2, fontWeight: 800, textTransform: "uppercase" }}>{phase.label}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginTop: 4 }}>{phase.months}</div>
                <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>{phase.dates}</div>
              </div>
              <div style={{ background: phase.color + "18", border: `1px solid ${phase.color}50`, borderRadius: 10, padding: "10px 14px", maxWidth: 380 }}>
                <div style={{ fontSize: 8, color: phase.color, fontWeight: 800, letterSpacing: 1.5, marginBottom: 5 }}>🏁 MILESTONE</div>
                <div style={{ fontSize: 12, color: "#ddd", lineHeight: 1.6 }}>{phase.milestone}</div>
              </div>
            </div>

            {/* THREE COLUMNS */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12 }}>
              {dayTypes.map(dt => (
                <div key={dt.key} style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 14, overflow: "hidden" }}>
                  <div style={{ background: dt.color + "16", borderBottom: `1px solid ${dt.color}30`, padding: "13px 15px", display: "flex", alignItems: "center", gap: 9 }}>
                    <span style={{ fontSize: 19 }}>{dt.icon}</span>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 800, color: "#fff" }}>{dt.sublabel}</div>
                      <div style={{ fontSize: 9, color: dt.color, fontWeight: 600 }}>{dt.label} · {dt.description}</div>
                    </div>
                  </div>
                  <div style={{ padding: "13px 15px" }}>
                    {phase[dt.key] && phase[dt.key].length > 0 && typeof phase[dt.key][0] === "object" ? (
                      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                        {phase[dt.key].map(bd => {
                          const eid = `${dt.key}-${phase.id}-${bd.day}`;
                          const isChecked = checkedTasks.has(eid);
                          const isX = xTasks.has(eid);
                          const cardBg = isChecked ? "#0d1a0d" : isX ? "#1a0d0d" : bd.overflow ? "#1a1208" : "#1a1a1a";
                          const cardBorder = isChecked ? "#22c55e33" : isX ? "#ef444433" : bd.overflow ? "#B4530944" : expandedDay === eid ? dt.color + "55" : "#252525";
                          return (
                            <div key={bd.day} onClick={() => toggleDay(eid)}
                              style={{ background: cardBg, border: `1px solid ${cardBorder}`, borderRadius: 8, padding: "8px 10px", cursor: "pointer", transition: "all 0.15s" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                                {/* Green tick */}
                                <div onClick={(e) => markTask(e, eid, bd, dt.key, phase.label, "complete")}
                                  style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${isChecked?"#22c55e":"#2a2a2a"}`, background: isChecked?"#22c55e":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", transition:"all 0.15s" }}>
                                  {isChecked && <span style={{ fontSize: 10, color: "#000", fontWeight: 900, lineHeight: 1 }}>✓</span>}
                                </div>
                                {/* Red X */}
                                <div onClick={(e) => markTask(e, eid, bd, dt.key, phase.label, "incomplete")}
                                  style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${isX?"#ef4444":"#2a2a2a"}`, background: isX?"#ef4444":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", transition:"all 0.15s" }}>
                                  {isX && <span style={{ fontSize: 10, color: "#fff", fontWeight: 900, lineHeight: 1 }}>✕</span>}
                                </div>
                                <div style={{ width: 24, height: 24, borderRadius: 6, background: bd.overflow ? "#B4530918" : dt.color + "18", border: `1px solid ${bd.overflow ? "#B4530966" : dt.color + "44"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                  <span style={{ fontSize: 9, fontWeight: 800, color: bd.overflow ? "#B45309" : dt.color }}>{bd.day}</span>
                                </div>
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", gap: 4, alignItems: "center" }}>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: isChecked?"#22c55e":isX?"#ef4444":"#e0e0e0", textDecoration:(isChecked||isX)?"line-through":"none", opacity:(isChecked||isX)?0.65:1 }}>{bd.task}</span>
                                    {bd.date && <span style={{ fontSize: 9, color: "#3a3a3a", whiteSpace: "nowrap", flexShrink: 0 }}>{bd.date}</span>}
                                  </div>
                                  {bd.overflow && <div style={{ fontSize: 8, color: "#B45309", marginTop: 1, fontWeight: 700 }}>⚠ Spills into next month</div>}
                                </div>
                                <span style={{ color: "#2a2a2a", fontSize: 9, flexShrink: 0 }}>{expandedDay === eid ? "▲" : "▼"}</span>
                              </div>
                              {expandedDay === eid && (
                                <div style={{ marginTop: 7, paddingTop: 7, borderTop: "1px solid #252525", fontSize: 11, color: "#888", lineHeight: 1.65 }}>
                                  {bd.detail}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    ) : phase[dt.key] && phase[dt.key].length > 0 ? (
                      phase[dt.key].map((task, i) => (
                        <div key={i} style={{ display: "flex", gap: 9, marginBottom: 9, alignItems: "flex-start" }}>
                          <div style={{ width: 5, height: 5, borderRadius: "50%", background: dt.color, marginTop: 6, flexShrink: 0 }} />
                          <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.55 }}>{task}</div>
                        </div>
                      ))
                    ) : (
                      <div style={{ fontSize: 11, color: "#2a2a2a", fontStyle: "italic", padding: "4px 0" }}>— Continuing on autopilot —</div>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {/* WEEKLY RHYTHM */}
            <div style={{ marginTop: 18, background: "#141414", border: "1px solid #1e1e1e", borderRadius: 12, padding: "14px 16px" }}>
              <div style={{ fontSize: 8, color: "#333", letterSpacing: 2.5, fontWeight: 800, marginBottom: 10, textTransform: "uppercase" }}>Weekly Rhythm</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
                {weekDays.map(x => (
                  <div key={x.d} style={{ textAlign: "center", background: x.c + "10", border: `1px solid ${x.c}25`, borderRadius: 7, padding: "7px 2px" }}>
                    <div style={{ fontSize: 13 }}>{x.i}</div>
                    <div style={{ fontSize: 7, fontWeight: 800, color: x.c, marginTop: 3, letterSpacing: 0.3 }}>{x.d}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* NAV */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16 }}>
              <button onClick={() => { setActivePhase(p => Math.max(0, p - 1)); setExpandedDay(null); }} disabled={activePhase === 0}
                style={{ background: activePhase === 0 ? "#0f0f0f" : "#1a1a1a", color: activePhase === 0 ? "#222" : "#999", border: "1px solid #222", borderRadius: 8, padding: "8px 18px", cursor: activePhase === 0 ? "default" : "pointer", fontSize: 12, fontWeight: 700 }}>
                ← Previous
              </button>
              <span style={{ color: "#2a2a2a", fontSize: 11 }}>{activePhase + 1} / {phases.length}</span>
              <button onClick={() => { setActivePhase(p => Math.min(phases.length - 1, p + 1)); setExpandedDay(null); }} disabled={activePhase === phases.length - 1}
                style={{ background: activePhase === phases.length - 1 ? "#0f0f0f" : phase.color, color: activePhase === phases.length - 1 ? "#222" : "#fff", border: "none", borderRadius: 8, padding: "8px 18px", cursor: activePhase === phases.length - 1 ? "default" : "pointer", fontSize: 12, fontWeight: 700 }}>
                Next →
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Schedule />);
  </script>
</body>
</html>
