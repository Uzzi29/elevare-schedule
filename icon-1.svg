<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0818"/>
      <stop offset="50%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#110820"/>
    </linearGradient>

    <!-- Purple accent gradient for the E -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5ff"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Thin accent line gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for the letter -->
    <filter id="letterGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Corner clip for rounded square -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" ry="111"
        fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Background radial glow behind letter -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGlow)"/>

  <!-- Geometric "E" lettermark — custom paths for a sharp, luxury feel -->
  <!-- The E is built from precise rectangles with a diagonal accent cut -->
  <g filter="url(#letterGlow)">

    <!-- Vertical spine of E -->
    <rect x="148" y="138" width="46" height="236" rx="4" fill="url(#letterGrad)"/>

    <!-- Top bar -->
    <rect x="148" y="138" width="218" height="46" rx="4" fill="url(#letterGrad)"/>

    <!-- Middle bar — slightly shorter, offset for elegance -->
    <rect x="148" y="233" width="178" height="42" rx="4" fill="url(#letterGrad)" opacity="0.95"/>

    <!-- Bottom bar -->
    <rect x="148" y="328" width="218" height="46" rx="4" fill="url(#letterGrad)"/>

    <!-- Diagonal accent slash — the signature mark -->
    <!-- A thin angled line across the top-right, giving upward energy -->
    <polygon
      points="348,138 366,138 274,374 256,374"
      fill="#7C3AED"
      opacity="0.35"/>

  </g>

  <!-- Thin horizontal accent line above the E (elevation mark) -->
  <rect x="106" y="108" width="300" height="2" rx="1" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Thin horizontal accent line below -->
  <rect x="106" y="402" width="300" height="2" rx="1" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Small diamond accent mark — top right corner detail -->
  <g transform="translate(392, 120)" opacity="0.6">
    <polygon points="0,-7 5,0 0,7 -5,0" fill="#c084fc"/>
  </g>

  <!-- Small diamond — bottom left -->
  <g transform="translate(120, 392)" opacity="0.6">
    <polygon points="0,-7 5,0 0,7 -5,0" fill="#c084fc"/>
  </g>

</svg>
